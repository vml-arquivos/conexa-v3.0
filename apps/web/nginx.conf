server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ─── Security: bloquear dotfiles (.env, .git, .htaccess, etc.) ───────────────
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
  }

  # ─── Security: bloquear arquivos sensíveis por extensão ──────────────────────
  location ~* \.(env|log|bak|sql|sh|conf|ini|key|pem|crt|p12|pfx)$ {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
  }

  # ─── Security headers ────────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ─── SPA fallback: qualquer rota vira index.html ─────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── Cache para assets do Vite (hash imutável) ───────────────────────────────
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ─── Healthcheck endpoint ────────────────────────────────────────────────────
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}
